<app-admin-shell>
  <div class="page-header">
    <div>
      <h2 class="page-title">Alumnos</h2>
      <p class="page-subtitle">Gestión de usuarios estudiantes</p>
    </div>
    <button mat-raised-button color="primary" (click)="openCreate()">
      <mat-icon>person_add</mat-icon>
      Nuevo Alumno
    </button>
  </div>

  <!-- Filter -->
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Buscar alumno</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput (keyup)="applyFilter($event)" placeholder="Nombre o email…" />
  </mat-form-field>

  <!-- Spinner -->
  <div *ngIf="loading" class="spinner-wrapper">
    <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
  </div>

  <!-- Material Table -->
  <div class="mat-elevation-z2 table-container" *ngIf="!loading">
    <table mat-table [dataSource]="dataSource" matSort class="w-100">

      <!-- Nombre -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let alumno">
          <div class="cell-primary">{{ alumno.name }}</div>
        </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
        <td mat-cell *matCellDef="let alumno">{{ alumno.email }}</td>
      </ng-container>

      <!-- Creado -->
      <ng-container matColumnDef="creado">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Registrado</th>
        <td mat-cell *matCellDef="let alumno">{{ alumno.created_at | date:'shortDate' }}</td>
      </ng-container>

      <!-- Acciones -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="text-end">Acciones</th>
        <td mat-cell *matCellDef="let alumno" class="text-end">
          <button mat-icon-button color="primary" (click)="openEdit(alumno)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="remove(alumno)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-state" [attr.colspan]="displayedColumns.length">
          <mat-icon>people_outline</mat-icon>
          <p>No hay alumnos que coincidan con el filtro</p>
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  </div>
</app-admin-shell>
    <div class="d-flex justify-content-between align-items-start mb-3">
